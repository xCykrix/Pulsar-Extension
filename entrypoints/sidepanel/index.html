<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulsar - Notification Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <style>
      :root {
        color-scheme: dark;
        --md-sys-color-primary: #d0bcff;
        --md-sys-color-on-primary: #381e72;
        --md-sys-color-primary-container: #4f378b;
        --md-sys-color-on-primary-container: #eaddff;
        --md-sys-color-secondary: #ccc2dc;
        --md-sys-color-on-secondary: #332d41;
        --md-sys-color-tertiary: #efb8c8;
        --md-sys-color-on-tertiary: #492532;
        --md-sys-color-error: #f2b8b5;
        --md-sys-color-on-error: #601410;
        --md-sys-color-surface: #1d1b20;
        --md-sys-color-on-surface: #e6e1e5;
        --md-sys-color-surface-variant: #141218;
        --md-sys-color-on-surface-variant: #cac4d0;
        --md-sys-color-background: #302d36;
        --md-sys-color-on-background: #e6e1e5;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        font-family: 'Roboto', sans-serif;
        background-color: var(--md-sys-color-background);
        color: var(--md-sys-color-on-background);
      }

      .container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        background-color: var(--md-sys-color-background);
      }

      .top-app-bar {
        background-color: var(--md-sys-color-surface-variant);
        color: var(--md-sys-color-on-surface);
        padding: 16px;
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .top-app-bar h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 500;
      }

      .content {
        flex: 1;
        padding: 24px;
        overflow-y: auto;
      }

      .card {
        background-color: var(--md-sys-color-surface);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
        box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.35), 0 1px 2px 0 rgba(0, 0, 0, 0.45);
      }

      button {
        font-family: 'Roboto', sans-serif;
        font-size: 14px;
        font-weight: 500;
        border: none;
        border-radius: 4px;
        padding: 8px 24px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: all 0.2s ease;
        pointer-events: auto;
      }

      .btn-filled {
        background-color: var(--md-sys-color-primary);
        color: var(--md-sys-color-on-primary);
      }

      .btn-filled:hover {
        background-color: #5a3d8a;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      }

      .btn-filled:active {
        transform: scale(0.98);
      }

      .btn-outlined {
        background-color: transparent;
        color: var(--md-sys-color-primary);
        border: 2px solid var(--md-sys-color-primary);
      }

      .btn-outlined:hover {
        background-color: var(--md-sys-color-primary-container);
      }

      .btn-outlined:active {
        transform: scale(0.98);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .material-icons-button {
        font-size: 18px;
      }

      md-button {
        --md-comp-button-label-text-font: 'Roboto', sans-serif;
        cursor: pointer;
        pointer-events: auto;
      }

      md-filled-button {
        cursor: pointer;
        pointer-events: auto;
      }

      md-outlined-button {
        cursor: pointer;
        pointer-events: auto;
      }

      md-filled-button [slot="icon"],
      md-outlined-button [slot="icon"] {
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
      }

      .top-app-bar {
        justify-content: space-between;
      }

      .top-app-bar-start {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .auth-section {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .user-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background-color: rgba(255, 255, 255, 0.12);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        border: 2px solid rgba(255, 255, 255, 0.2);
      }

      .user-avatar img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
      }

      .logout-menu {
        position: absolute;
        top: 60px;
        right: 16px;
        background-color: var(--md-sys-color-surface);
        border-radius: 8px;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.45);
        display: none;
        z-index: 1000;
        min-width: 150px;
      }

      .logout-menu.show {
        display: block;
      }

      .logout-menu-item {
        padding: 12px 16px;
        cursor: pointer;
        color: var(--md-sys-color-on-surface);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .logout-menu-item:hover {
        background-color: var(--md-sys-color-primary-container);
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 20px;
        transform: translateX(-50%) translateY(12px);
        min-width: 260px;
        max-width: min(92vw, 520px);
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 14px;
        line-height: 1.35;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease, transform 0.2s ease;
        z-index: 1200;
      }

      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      .toast-error {
        background-color: #8c1d18;
        color: #ffe9e7;
        border: 1px solid #d35f59;
      }

      .toast-info {
        background-color: #2f2b35;
        color: var(--md-sys-color-on-surface);
        border: 1px solid #5f5968;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="top-app-bar">
        <div class="top-app-bar-start">
          <span class="material-icons">featured_play_list</span>
          <h1>Pulsar - Notification Assistant</h1>
        </div>
        <div class="auth-section" id="authSection">
          <md-filled-button id="discordLoginBtn">
            <svg slot="icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.211.375-.444.864-.607 1.25a18.27 18.27 0 0 0-5.487 0c-.163-.386-.395-.875-.607-1.25a.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.873-1.295 1.226-1.994a.076.076 0 0 0-.042-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.294.075.075 0 0 1 .078-.01c3.928 1.793 8.18 1.793 12.062 0a.075.075 0 0 1 .079.009c.12.098.246.198.373.294a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.076.076 0 0 0-.041.107c.36.699.77 1.364 1.225 1.994a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.057c.5-4.761-.838-8.898-3.557-12.56a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-.965-2.157-2.156 0-1.193.964-2.157 2.157-2.157 1.193 0 2.157.964 2.157 2.157 0 1.191-.964 2.156-2.157 2.156zm7.975 0c-1.183 0-2.157-.965-2.157-2.156 0-1.193.964-2.157 2.157-2.157 1.193 0 2.157.964 2.157 2.157 0 1.191-.964 2.156-2.157 2.156z"/>
            </svg>
            Login with Discord
          </md-filled-button>
          <div class="user-avatar" id="userAvatar" style="display: none;">
            <img id="avatarImg" />
          </div>
          <div class="logout-menu" id="logoutMenu">
            <div class="logout-menu-item" id="logoutBtn">
              <span class="material-icons" style="font-size: 18px;">logout</span>
              Logout
            </div>
          </div>
        </div>
      </div>
      <div class="content">
        <div class="card" style="min-height: 120px; display: flex; align-items: center; justify-content: center;">
          <p style="margin: 0; font-size: 18px; color: var(--md-sys-color-on-surface);">Hello world</p>
        </div>
      </div>
    </div>
    <div class="toast toast-info" id="appToast" role="status" aria-live="polite"></div>
    <script type="module" src="./sidepanel.js"></script>
  </body>
</html>
